[workspace]
dependencies_update = true
git_release_enable = false
semver_check = true
pr_branch_prefix = "release-plz/"
pr_name = "chore(release): prepare for publishing"
changelog_config = "cliff.toml"
release_commits = "^(feat|docs|fix|build|perf)"

# Executable crates for which we push a GitHub release (and attach prebuilt binaries via
# release-binaries.yml). Each is released under its own tag (ironrdp-agent-v*, ironrdp-viewer-v*).
[[package]]
name = "ironrdp-agent"
git_release_enable = true
[[package]]
name = "ironrdp-viewer"
git_release_enable = true

# ironrdp-tls does not compile if no backend is specified, and the following crates depend on it
# without enabling a backend by default. rustls is the most common backend, so we let cargo publish
# check with it.
[[package]]
name = "ironrdp-tls"
publish_features = ["rustls"]
[[package]]
name = "ironrdp-client"
publish_features = ["rustls"]
[[package]]
name = "ironrdp-mstsgu"
publish_features = ["rustls"]

# *-native crates may have all kinds of system requirements depending on the platform.
# We can only check for the current platform when cargo publish is invoked, all the others are effectively unverified.
# For this reason, it's not worth complexifying the release-crates.yml workflow.
# We already verify all targets properly in the regular CI workflow.
[[package]]
name = "ironrdp-rdpdr-native"
publish_no_verify = true
[[package]]
name = "ironrdp-rdpsnd-native"
publish_no_verify = true
[[package]]
name = "ironrdp-cliprdr-native"
publish_no_verify = true
